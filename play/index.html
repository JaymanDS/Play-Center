<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player - Play Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        .game-header {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1.5rem;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-button {
            padding: 0.5rem 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: #764ba2;
        }

        .game-title {
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .header-right {
            display: flex;
            gap: 1rem;
        }

        .controls-button {
            padding: 0.5rem 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .controls-button:hover {
            background: #764ba2;
        }

        .controls-button.active {
            background: #f39c12;
        }

        .game-wrapper {
            background: #000;
            border-radius: 0 0 15px 15px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            display: flex;
            min-height: 600px;
        }

        .game-frame {
            flex: 1;
            border: none;
            width: 100%;
        }

        .side-panel {
            background: rgba(255, 255, 255, 0.95);
            width: 300px;
            padding: 1.5rem;
            overflow-y: auto;
            display: none;
        }

        .side-panel.active {
            display: block;
        }

        .panel-section {
            margin-bottom: 2rem;
        }

        .panel-section h3 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 0.5rem;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            color: #333;
        }

        .controls-list {
            list-style: none;
        }

        .controls-list li {
            padding: 0.5rem 0;
            color: #333;
            border-bottom: 1px solid #eee;
        }

        .controls-list li:last-child {
            border-bottom: none;
        }

        .fullscreen-button {
            padding: 0.5rem 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            width: 100%;
            transition: background 0.3s;
        }

        .fullscreen-button:hover {
            background: #764ba2;
        }

        .footer-info {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 1rem;
            text-align: center;
            font-size: 0.9rem;
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .game-header {
                flex-direction: column;
                text-align: center;
            }

            .game-title {
                font-size: 1.5rem;
            }

            .game-wrapper {
                flex-direction: column;
                min-height: 400px;
            }

            .side-panel {
                width: 100%;
                max-height: 300px;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }
        }

        /* Fullscreen styles */
        .game-wrapper.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 0;
            z-index: 9999;
        }

        .game-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0;
            z-index: 9998;
        }

        .game-header.fullscreen-hidden {
            display: none;
        }

        .exit-fullscreen-button {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 0.75rem 1.5rem;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            z-index: 10000;
            display: none;
        }

        .exit-fullscreen-button.active {
            display: block;
        }
    </style>
</head>
<body>
    <button class="exit-fullscreen-button" id="exitFullscreenBtn" onclick="exitFullscreen()">✕ Volledig Scherm Sluiten</button>

    <div class="game-container" id="gameContainer">
        <div class="game-header" id="gameHeader">
            <div class="header-left">
                <a href="index.html" class="back-button">← Terug</a>
                <div class="game-title" id="gameTitle">Game Player</div>
            </div>
            <div class="header-right">
                <button class="controls-button" id="togglePanelBtn" onclick="togglePanel()">ⓘ Info</button>
                <button class="controls-button" onclick="toggleFullscreen()">⛶ Volledig Scherm</button>
            </div>
        </div>

        <div class="game-wrapper" id="gameWrapper">
            <iframe class="game-frame" id="gameFrame" src="" allowfullscreen></iframe>
            
            <div class="side-panel" id="sidePanel">
                <div class="panel-section">
                    <h3>📊 Spelstatistieken</h3>
                    <div class="stats-item">
                        <span>Moeilijkheid:</span>
                        <strong>Normaal</strong>
                    </div>
                    <div class="stats-item">
                        <span>FPS:</span>
                        <strong id="fps">60</strong>
                    </div>
                    <div class="stats-item">
                        <span>Speeltijd:</span>
                        <strong id="playtime">00:00</strong>
                    </div>
                </div>

                <div class="panel-section">
                    <h3>⌨️ Bediening</h3>
                    <ul class="controls-list">
                        <li><strong>Pijltjestoetsen</strong> - Beweging</li>
                        <li><strong>Spatiebalk</strong> - Springen/Actie</li>
                        <li><strong>Muis</strong> - Kijken/Richten</li>
                        <li><strong>ESC</strong> - Menu</li>
                        <li><strong>F</strong> - Volledig scherm</li>
                    </ul>
                </div>

                <div class="panel-section">
                    <h3>⚙️ Opties</h3>
                    <button class="fullscreen-button" onclick="toggleFullscreen()">⛶ Volledig Scherm</button>
                    <button class="fullscreen-button" style="background: #e74c3c; margin-top: 0.5rem;" onclick="resetGame()">🔄 Herstarten</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-info">
        <p>Play Center © 2026 | Veel plezier met spelen! 🎮</p>
    </div>

    <script>
        let playtime = 0;
        let isFullscreen = false;

        // Get game from URL parameter
        function getGameFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('game') || 'eagelcraft';
        }

        // Set game data
        function setGameData(gameName) {
            const gameData = {
                'eagelcraft': {
                    title: '⛏️ Eagelcraft',
                    url: 'eagelcraft/game/index.html'
                },
                '2048': {
                    title: '🧩 2048',
                    url: '2048'
                },
                'sample': {
                    title: '🎮 Sample Game',
                    url: 'https://example.com/game'
                }
            };

            const game = gameData[gameName] || gameData['eagelcraft'];
            document.getElementById('gameTitle').textContent = game.title;
            document.getElementById('gameFrame').src = game.url;
        }

        // Toggle side panel
        function togglePanel() {
            const panel = document.getElementById('sidePanel');
            const btn = document.getElementById('togglePanelBtn');
            panel.classList.toggle('active');
            btn.classList.toggle('active');
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            isFullscreen = !isFullscreen;
            const container = document.getElementById('gameContainer');
            const wrapper = document.getElementById('gameWrapper');
            const header = document.getElementById('gameHeader');
            const exitBtn = document.getElementById('exitFullscreenBtn');

            if (isFullscreen) {
                container.classList.add('fullscreen');
                wrapper.classList.add('fullscreen');
                header.classList.add('fullscreen-hidden');
                exitBtn.classList.add('active');
            } else {
                exitFullscreen();
            }
        }

        // Exit fullscreen
        function exitFullscreen() {
            isFullscreen = false;
            const container = document.getElementById('gameContainer');
            const wrapper = document.getElementById('gameWrapper');
            const header = document.getElementById('gameHeader');
            const exitBtn = document.getElementById('exitFullscreenBtn');

            container.classList.remove('fullscreen');
            wrapper.classList.remove('fullscreen');
            header.classList.remove('fullscreen-hidden');
            exitBtn.classList.remove('active');
        }

        // Reset game
        function resetGame() {
            const frame = document.getElementById('gameFrame');
            frame.src = frame.src;
            playtime = 0;
            updatePlaytime();
        }

        // Update playtime
        function updatePlaytime() {
            const minutes = Math.floor(playtime / 60);
            const seconds = playtime % 60;
            const timeStr = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            document.getElementById('playtime').textContent = timeStr;
        }

        // Update FPS (simulated)
        function updateFPS() {
            const fps = Math.floor(Math.random() * 20) + 55;
            document.getElementById('fps').textContent = fps;
        }

        // Initialize
        window.addEventListener('load', function() {
            const game = getGameFromURL();
            setGameData(game);

            // Update playtime every second
            setInterval(() => {
                playtime++;
                updatePlaytime();
            }, 1000);

            // Update FPS every 2 seconds
            setInterval(updateFPS, 2000);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F') {
                e.preventDefault();
                toggleFullscreen();
            }
            if (e.key === 'Escape' && isFullscreen) {
                exitFullscreen();
            }
        });
    </script>
</body>
</html>
